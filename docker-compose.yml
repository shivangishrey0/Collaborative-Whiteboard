services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/whiteboardDB
      FRONTEND_URL: http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data:
